<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Pharma CI Mobile</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(120deg, rgba(249, 194, 146, 0.35), rgba(183, 235, 221, 0.45)),
          #f8fafc;
        color: #111827;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0.5rem 0;
        line-height: 1.5;
      }

      code {
        font-family: monospace;
        font-size: 0.95em;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            linear-gradient(120deg, rgba(120, 53, 15, 0.45), rgba(6, 78, 59, 0.45)),
            #020617;
          color: #f8fafc;
        }

        main {
          background: rgba(15, 23, 42, 0.88);
          box-shadow: 0 18px 40px rgba(2, 6, 23, 0.45);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pharma CI Mobile</h1>
      <p>
        Cette version Capacitor a besoin d'une URL d'application web servie pour
        charger l'interface Next.js.
      </p>
      <p>
        Définissez <code>CAPACITOR_SERVER_URL</code> puis relancez
        <code>npm run cap:sync</code>.
      </p>
    </main>
  </body>
</html>
